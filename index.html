<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Revelation</title>

  <!-- Font: Fira Code -->
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">

  <!-- Material Icons -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Fira Code', monospace;
      background: linear-gradient(145deg, #0f2027, #203a43, #2c5364);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 60px 20px;
    }

    .button-container {
      display: flex;
      gap: 30px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 1200px;
      width: 100%;
    }

    .lang-card {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 24px;
      padding: 60px 40px;
      width: 280px;
      text-align: center;
      color: #ffffff;
      font-weight: 600;
      font-size: 18px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0, 255, 255, 0.1);
      position: relative;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      overflow: hidden;
      z-index: 1;
    }

    .lang-card:hover {
      transform: scale(1.03);
      box-shadow: 0 12px 24px rgba(0, 255, 255, 0.15);
    }

    .lang-icon {
      font-size: 48px;
      margin-bottom: 20px;
      color: #00e0ff;
      transition: transform 0.2s ease;
      z-index: 2;
    }

    .lang-card:hover .lang-icon {
      transform: scale(1.1);
    }

    .material-icons {
      font-size: 48px;
      color: #00e0ff;
    }

    @media (max-width: 900px) {
      .button-container {
        flex-direction: column;
        gap: 20px;
        align-items: center;
      }
    }

    .visit-counter {
      position: fixed;
      bottom: 14px;
      left: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      font-family: 'Fira Code', monospace;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.7);
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 1000;
      user-select: none;
      pointer-events: none;
    }

    .visit-counter .material-icons {
      font-size: 14px;
      color: #00e0ff;
    }
  </style>
</head>
<body>
  <div class="button-container">
    <div class="lang-card" onclick="location.href='english.html'">
      <div class="lang-icon"><span class="material-icons">menu_book</span></div>
      Read in English
    </div>

    <div class="lang-card" onclick="location.href='russian.html'">
      <div class="lang-icon"><span class="material-icons">menu_book</span></div>
      Читать по-русски
    </div>

    <div class="lang-card" onclick="location.href='georgian.html'">
      <div class="lang-icon"><span class="material-icons">menu_book</span></div>
      წაიკითხე ქართულად
    </div>
  </div>

  <div class="visit-counter" aria-label="visits">
    <span class="material-icons">visibility</span>
    <span id="visit-count">…</span>
  </div>
  <script src="counter.js"></script>
</body>
</html>
