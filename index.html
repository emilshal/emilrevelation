<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Revelation</title>

  <!-- Apply saved theme before paint to avoid flash -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('er_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();
  </script>

  <!-- Material Icons -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />

  <style>
    :root {
      --bg: linear-gradient(145deg, #0f2027, #203a43, #2c5364);
      --text: #ffffff;
      --container-bg: rgba(255, 255, 255, 0.06);
      --container-border: rgba(255, 255, 255, 0.15);
      --accent: #00e0ff;
      --pill-bg: rgba(0, 0, 0, 0.25);
      --pill-text: rgba(255, 255, 255, 0.7);
      --pill-border: rgba(255, 255, 255, 0.12);
      --shadow-card: 0 8px 20px rgba(0, 255, 255, 0.1);
      --shadow-card-hover: 0 12px 24px rgba(0, 255, 255, 0.15);
    }

    [data-theme="light"] {
      --bg: linear-gradient(145deg, #f8f9fa, #e9ecef, #dee2e6);
      --text: #1a1a1a;
      --container-bg: rgba(255, 255, 255, 0.7);
      --container-border: rgba(0, 0, 0, 0.1);
      --accent: #0077a8;
      --pill-bg: rgba(255, 255, 255, 0.7);
      --pill-text: rgba(0, 0, 0, 0.7);
      --pill-border: rgba(0, 0, 0, 0.1);
      --shadow-card: 0 8px 20px rgba(0, 119, 168, 0.1);
      --shadow-card-hover: 0 12px 24px rgba(0, 119, 168, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Times New Roman', Times, serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 60px 20px;
      transition: background 0.3s ease, color 0.3s ease;
    }

    .button-container {
      display: flex;
      gap: 30px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 1200px;
      width: 100%;
    }

    .lang-card {
      background: var(--container-bg);
      border: 1px solid var(--container-border);
      border-radius: 24px;
      padding: 60px 40px;
      width: 280px;
      text-align: center;
      color: var(--text);
      font-weight: 600;
      font-size: 18px;
      cursor: pointer;
      box-shadow: var(--shadow-card);
      position: relative;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.3s ease, border-color 0.3s ease, color 0.3s ease;
      overflow: hidden;
      z-index: 1;
    }

    .lang-card:hover {
      transform: scale(1.03);
      box-shadow: var(--shadow-card-hover);
    }

    .lang-icon {
      font-size: 48px;
      margin-bottom: 20px;
      color: var(--accent);
      transition: transform 0.2s ease, color 0.3s ease;
      z-index: 2;
    }

    .lang-card:hover .lang-icon {
      transform: scale(1.1);
    }

    .material-icons {
      font-size: 48px;
      color: var(--accent);
    }

    @media (max-width: 900px) {
      .button-container {
        flex-direction: column;
        gap: 20px;
        align-items: center;
      }
    }

    .visit-counter {
      position: fixed;
      bottom: 14px;
      left: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      font-family: 'Times New Roman', Times, serif;
      font-size: 12px;
      color: var(--pill-text);
      background: var(--pill-bg);
      border: 1px solid var(--pill-border);
      border-radius: 999px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 1000;
      user-select: none;
      pointer-events: none;
      transition: background 0.3s ease, border-color 0.3s ease, color 0.3s ease;
    }

    .visit-counter .material-icons {
      font-size: 14px;
      color: var(--accent);
    }

    .theme-toggle {
      position: fixed;
      top: 14px;
      right: 14px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      background: var(--pill-bg);
      border: 1px solid var(--pill-border);
      border-radius: 999px;
      color: var(--accent);
      cursor: pointer;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 1000;
      transition: background 0.3s ease, border-color 0.3s ease, color 0.3s ease, transform 0.15s ease;
    }

    .theme-toggle:hover {
      transform: scale(1.08);
    }

    .theme-toggle .material-icons {
      font-size: 20px;
      color: var(--accent);
    }
  </style>
</head>
<body>
  <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
    <span class="material-icons" id="theme-icon">light_mode</span>
  </button>

  <div class="button-container">
    <div class="lang-card" onclick="location.href='english.html'">
      <div class="lang-icon"><span class="material-icons">menu_book</span></div>
      Read in English
    </div>

    <div class="lang-card" onclick="location.href='russian.html'">
      <div class="lang-icon"><span class="material-icons">menu_book</span></div>
      Читать по-русски
    </div>

    <div class="lang-card" onclick="location.href='georgian.html'">
      <div class="lang-icon"><span class="material-icons">menu_book</span></div>
      წაიკითხე ქართულად
    </div>
  </div>

  <div class="visit-counter" aria-label="visits">
    <span class="material-icons">visibility</span>
    <span id="visit-count">…</span>
  </div>
  <script src="theme.js"></script>
  <script src="counter.js"></script>
</body>
</html>
